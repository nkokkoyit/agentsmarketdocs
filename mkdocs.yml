site_name: AgentsMarket Integration Documentation
site_description: Complete guide for integrating AgentsMarket with external platforms
site_dir: build
theme:
  name: readthedocs
  features:
    - search.highlight
    - search.share

nav:
  - Home: index.md
  
  - Getting Started:
    - Introduction: getting-started/01-introduction.md
    - Authentication: getting-started/02-authentication.md
  
  - API Guide:
    - Overview: api-guide/01-api-overview.md
  
  - Integration Patterns:
    - Code Examples:
      - cURL: integration-patterns/code-examples/01-curl.md
      - Python: integration-patterns/code-examples/02-python.md
      - JavaScript: integration-patterns/code-examples/03-javascript.md
    - Workflows: integration-patterns/02-workflows.md
    - Async Patterns & Webhooks: integration-patterns/03-async-patterns.md
  
  - Operations:
    - Troubleshooting & Operations: operations/01-troubleshooting.md
  
  - Architecture:
    - System Overview: architecture/01-system-overview.md
  
  - Reference:
    - Glossary: reference/glossary.md
    - OpenAPI Specification: reference/openapi.yaml

plugins:
  - search:
      lang: en
