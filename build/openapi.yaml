openapi: "3.1.0"
info:
  title: AI Recruitment System API
  description: |
    AI-Powered Recruitment Assistant using CrewAI.
    Most endpoints require JWT Bearer authentication (via `POST /api/v1/auth/token`).
    The `/api/v1/workers/*` endpoints additionally accept HTTP Basic Auth
    (email:password) for external integrations such as CEONova.

    **CEONOVA Integration Guide:**
    Comprehensive documentation for integrating AgentsMarket with external platforms.
    - [README](../../integrations/ceonova/README.md) — Overview & quick start
    - [01-authentication.md](../../integrations/ceonova/01-authentication.md) — Auth setup (JWT + Basic)
    - [02-api-reference.md](../../integrations/ceonova/02-api-reference.md) — Full endpoint specifications
    - [03-code-examples.md](../../integrations/ceonova/03-code-examples.md) — Ready-to-use code (cURL, Python, JS)
    - [04-use-case-workflows.md](../../integrations/ceonova/04-use-case-workflows.md) — Bulk screening, parallel workers, error handling
    - [05-webhooks-async-patterns.md](../../integrations/ceonova/05-webhooks-async-patterns.md) — Async polling, exponential backoff, circuit breaker
    - [06-troubleshooting-operations.md](../../integrations/ceonova/06-troubleshooting-operations.md) — Error codes, debugging, monitoring
  version: "1.0.0"
  contact:
    name: AgentsMarket Team

servers:
  - url: http://localhost:8000
    description: Local development
  - url: https://api.agentsmarket.internal
    description: Production

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Obtain a token via `POST /api/v1/auth/token` (OAuth2 password flow).
        Include as `Authorization: Bearer <token>` header.

    BasicAuth:
      type: http
      scheme: basic
      description: |
        HTTP Basic Auth using AgentsMarket email and password.
        Used by external integrations (e.g. CEONova) as an alternative to JWT Bearer.
        Include as `Authorization: Basic base64(email:password)` header.

  schemas:
    # ── Auth ──────────────────────────────────────────────
    TokenResponse:
      type: object
      required: [access_token, token_type]
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: bearer

    # ── Crews ─────────────────────────────────────────────
    AgentInfo:
      type: object
      properties:
        agent_key:
          type: string
        role:
          type: string
        goal:
          type: string

    TaskInfo:
      type: object
      properties:
        task_key:
          type: string
        agent_key:
          type: string
        order_index:
          type: integer

    CrewInfo:
      type: object
      properties:
        crew_key:
          type: string
          example: recruitment_v1
        version:
          type: integer
          example: 1
        description:
          type: string
        category:
          type: string
          example: recruitment
        process_type:
          type: string
          enum: [sequential, hierarchical]
        status:
          type: string
          enum: [published, draft, archived]
        agents:
          type: array
          items:
            $ref: "#/components/schemas/AgentInfo"
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/TaskInfo"

    CrewListResponse:
      type: object
      properties:
        crews:
          type: array
          items:
            $ref: "#/components/schemas/CrewInfo"

     # ── Tasks (legacy endpoint — prefer /jobs/) ────────────
    TaskCreateRequest:
      type: object
      properties:
        cv_text:
          type: string
          description: Candidate CV/resume text
          nullable: true
        job_description:
          type: string
          description: Job description text
          nullable: true
        crew_key:
          type: string
          description: Override the default crew (defaults to recruitment_screening)
          nullable: true
      additionalProperties: true

    TaskCreateResponse:
      type: object
      properties:
        task_id:
          type: string
          format: uuid

    # ── Results ───────────────────────────────────────────
    CandidateResult:
      type: object
      properties:
        name:
          type: string
          nullable: true
        score:
          type: number
          format: float
          nullable: true
        skills:
          type: array
          items:
            type: string
          nullable: true
        match_level:
          type: string
          nullable: true
        recommendation:
          type: string
          nullable: true

    TaskResultResponse:
      type: object
      properties:
        task_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, running, done, failed, unknown]
        result:
          nullable: true

    # ── Workers ───────────────────────────────────────────
    WorkerInfo:
      type: object
      required: [worker_id, name, description, status, capabilities]
      properties:
        worker_id:
          type: string
          description: Matches the crew_key (single source of truth)
        name:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [available]
        capabilities:
          type: array
          items:
            type: string

    WorkerListResponse:
      type: object
      required: [workers]
      properties:
        workers:
          type: array
          items:
            $ref: "#/components/schemas/WorkerInfo"

    WorkerTaskSubmitRequest:
      type: object
      required: [title, objective, external_user_id]
      properties:
        title:
          type: string
        objective:
          type: string
        context:
          type: string
          nullable: true
        expected_output:
          type: string
          nullable: true
        external_user_id:
          type: string
          description: CEONova user ID (stored as ceonova:{external_user_id})

    WorkerTaskSubmitResponse:
      type: object
      required: [task_id, worker_id]
      properties:
        task_id:
          type: string
          format: uuid
        worker_id:
          type: string

    WorkerTaskListItem:
      type: object
      required: [task_id, worker_id, status]
      properties:
        task_id:
          type: string
          format: uuid
        worker_id:
          type: string
        status:
          type: string
        created_at:
          type: string
          nullable: true

    WorkerTaskListResponse:
      type: object
      required: [total, items]
      properties:
        total:
          type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/WorkerTaskListItem"

    WorkerTaskStatusResponse:
      type: object
      required: [task_id, worker_id, status]
      properties:
        task_id:
          type: string
          format: uuid
        worker_id:
          type: string
        status:
          type: string
          enum: [pending, running, done, failed, unknown]
        result:
          nullable: true

    # ── Errors ────────────────────────────────────────────
    HTTPError:
      type: object
      properties:
        detail:
          type: string

paths:
  # ── Health ────────────────────────────────────────────
  /health:
    get:
      summary: Health check
      description: Returns HTTP 200 when the API is running. No authentication required.
      operationId: healthCheck
      security: []
      tags: [System]
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  # ── Auth ──────────────────────────────────────────────
  /api/v1/auth/register:
    post:
      summary: Register a new user account
      description: |
        Create a new AgentsMarket user account (required before using API).
        Account is active immediately. Use email + password for future logins.

        **CEONova setup:** Register account here, then use Basic Auth with
        email:password credentials on /api/v1/workers/* endpoints.
      operationId: register
      security: []
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
                  minLength: 8
            examples:
              ceonova:
                summary: Register CEONova integration account
                value:
                  email: "ceonova@agentsmarket.com"
                  password: "secure-password-min-8-chars"
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id:
                    type: string
                    format: uuid
                  email:
                    type: string
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPError"

  /api/v1/auth/token:
    post:
      summary: Obtain access token (OAuth2 Password Flow)
      description: |
        Exchange username + password for a JWT access token.
        Use the returned `access_token` as `Authorization: Bearer <token>`.
      operationId: loginForAccessToken
      security: []
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
                  format: password
      responses:
        "200":
          description: Token issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPError"

  # ── Crews ─────────────────────────────────────────────
  /api/v1/crews/:
    get:
      summary: List available crew templates
      description: Returns all published CrewAI workflow templates. Public endpoint — no authentication required.
      operationId: listCrews
      security: []
      tags: [Crews]
      responses:
        "200":
          description: List of published crew templates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrewListResponse"


  # ── Tasks (legacy) ────────────────────────────────────
  /api/v1/tasks/:
    post:
      summary: Create a task (legacy endpoint)
      description: |
        Simplified wrapper around job submission for recruitment screening tasks.
        Prefer `POST /api/v1/jobs/` for full control.
        **Requires authentication.**
      operationId: createTask
      tags: [Tasks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskCreateRequest"
            examples:
              basic:
                summary: Screen a candidate
                value:
                  cv_text: "Jane Doe — 5 years Java..."
                  job_description: "Java Backend Developer..."
      responses:
        "202":
          description: Task accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskCreateResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPError"
        "404":
          description: Crew not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPError"

  # ── Results ───────────────────────────────────────────
  /api/v1/results/{task_id}:
    get:
      summary: Get task result
      description: |
        Retrieve the result for a previously submitted task or job.
        **Requires authentication.**
      operationId: getResult
      tags: [Results]
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: UUID returned by POST /tasks/ or POST /jobs/
      responses:
        "200":
          description: Task result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResultResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPError"
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPError"

  # ── Workers (CEONova integration) ─────────────────────
  /api/v1/workers/:
    get:
      summary: List available workers
      description: |
        Returns all published CrewAI templates as AI workers.
        Accepts **JWT Bearer** or **HTTP Basic** authentication.

        **Response includes:** worker_id, name, description, capabilities.
        Use worker_id in subsequent requests to submit tasks.
      operationId: listWorkers
      tags: [Workers]
      security:
        - BearerAuth: []
        - BasicAuth: []
      responses:
        "200":
          description: List of workers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkerListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPError"

  /api/v1/workers/{worker_id}:
    get:
      summary: Get a specific worker
      description: |
        Returns details for one worker (crew template).
        Accepts **JWT Bearer** or **HTTP Basic** authentication.

        **Use worker_id from worker discovery** (e.g. 'recruitment_v1')
      operationId: getWorker
      tags: [Workers]
      security:
        - BearerAuth: []
        - BasicAuth: []
      parameters:
        - name: worker_id
          in: path
          required: true
          schema:
            type: string
          description: Worker ID (equals crew_key, e.g. `recruitment_v1`)
      responses:
        "200":
          description: Worker details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkerInfo"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPError"
        "404":
          description: Worker not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPError"

  /api/v1/workers/{worker_id}/tasks:
    post:
      summary: Submit a task to a worker
      description: |
        Submits a new AI task to the specified worker (crew template).
        Returns task_id (UUID) for polling status. Response: 202 Accepted.

        The `external_user_id` is stored as `ceonova:{external_user_id}` for filtering.
        Rate limit: 20 requests/minute per IP.

        Accepts **JWT Bearer** or **HTTP Basic** authentication.
      operationId: submitWorkerTask
      tags: [Workers]
      security:
        - BearerAuth: []
        - BasicAuth: []
      parameters:
        - name: worker_id
          in: path
          required: true
          schema:
            type: string
          description: Worker ID (equals crew_key)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkerTaskSubmitRequest"
            examples:
              recruitment:
                summary: Submit a recruitment screening task
                value:
                  title: "Screen Jane Doe"
                  objective: "Evaluate candidate for Senior Java Engineer role"
                  context: "JD requires 5+ years Java, Spring Boot, microservices. Candidate has 8 years experience."
                  expected_output: "Candidate score (0-100) and hiring recommendation (PASS/MAYBE/REJECT)"
                  external_user_id: "ceonova-user-456"
      responses:
        "202":
          description: Task accepted and queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkerTaskSubmitResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPError"
        "404":
          description: Worker not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPError"

    get:
      summary: List tasks for a worker filtered by external user
      description: |
        Returns paginated tasks submitted by a specific CEONova user to this worker.
        Supports pagination: limit (1-100, default 20), offset (default 0).
        Accepts **JWT Bearer** or **HTTP Basic** authentication.

        **Use for:** Monitoring user's tasks, batch polling, dashboards.
      operationId: listWorkerTasks
      tags: [Workers]
      security:
        - BearerAuth: []
        - BasicAuth: []
      parameters:
        - name: worker_id
          in: path
          required: true
          schema:
            type: string
        - name: external_user_id
          in: query
          required: true
          schema:
            type: string
          description: CEONova user ID to filter tasks by
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        "200":
          description: Paginated task list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkerTaskListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPError"
        "404":
          description: Worker not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPError"

  /api/v1/workers/{worker_id}/tasks/{task_id}:
    get:
      summary: Get task status and result
      description: |
        Poll for task status and result. Status: pending|running|done|failed|unknown.
        When `status=done`, `result` contains crew output.

        **Polling strategy:** Use exponential backoff (1s → 2s → 4s → 60s cap).
        Typical execution: 2-10 minutes. Max timeout: ~15 minutes.

        **IDOR guard:** If `external_user_id` provided, verifies task ownership.
        CEONova account can query all its tasks without filtering.
        Accepts **JWT Bearer** or **HTTP Basic** authentication.
      operationId: getWorkerTaskStatus
      tags: [Workers]
      security:
        - BearerAuth: []
        - BasicAuth: []
      parameters:
        - name: worker_id
          in: path
          required: true
          schema:
            type: string
        - name: task_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: external_user_id
          in: query
          required: false
          description: |
            Optional. When provided, restricts the response to tasks owned by
            this end-user within CEONova's system. If the task's owner does not
            match, the server returns `404` (prevents IDOR across end-users).
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: Task status and result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkerTaskStatusResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPError"
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPError"

tags:
  - name: System
    description: Health and infrastructure endpoints
  - name: Auth
    description: Authentication — obtain JWT tokens
  - name: Crews
    description: Browse available CrewAI workflow templates
  - name: Tasks
    description: Legacy task API (wraps Jobs)
  - name: Results
    description: Retrieve job/task execution results
  - name: Workers
    description: |
      CEONova integration — AgentsMarket crew templates exposed as AI workers.
      Supports both JWT Bearer and HTTP Basic authentication.

      **Documentation:** See [CEONOVA Integration Guide](../../integrations/ceonova/) for detailed implementation guide.
