openapi: "3.1.0"
info:
  title: AgentsMarket Workers API
  description: |
    REST API for integrating AgentsMarket with external platforms (e.g., CEONOVA).
    
    **Main endpoints for integration:**
    - `GET /api/v1/workers/` — Discover available workers
    - `POST /api/v1/workers/{worker_id}/tasks` — Submit a task
    - `GET /api/v1/workers/{worker_id}/tasks/{task_id}` — Poll task status & result
    
    **Authentication:** HTTP Basic Auth (email:password) or JWT Bearer
    
    **Full documentation:** See [API Guide](../api-guide/01-api-overview.md)
    
  version: "1.0.0"
  contact:
    name: AgentsMarket Support

servers:
  - url: http://localhost:8000
    description: Development
  - url: https://api.agentsmarket.com
    description: Production

security:
  - BasicAuth: []
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT Bearer token obtained via POST /api/v1/auth/token

    BasicAuth:
      type: http
      scheme: basic
      description: HTTP Basic Auth using email:password

  schemas:
    WorkerInfo:
      type: object
      required: [worker_id, name, description, status, capabilities]
      properties:
        worker_id:
          type: string
        name:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [available]
        capabilities:
          type: array
          items:
            type: string

    WorkerListResponse:
      type: object
      properties:
        workers:
          type: array
          items:
            $ref: "#/components/schemas/WorkerInfo"

    WorkerTaskSubmitRequest:
      type: object
      required: [title, objective, external_user_id]
      properties:
        title:
          type: string
        objective:
          type: string
        context:
          type: string
          nullable: true
        expected_output:
          type: string
          nullable: true
        external_user_id:
          type: string

    WorkerTaskSubmitResponse:
      type: object
      required: [task_id, worker_id]
      properties:
        task_id:
          type: string
          format: uuid
        worker_id:
          type: string

    WorkerTaskStatusResponse:
      type: object
      required: [task_id, worker_id, status]
      properties:
        task_id:
          type: string
          format: uuid
        worker_id:
          type: string
        status:
          type: string
          enum: [pending, running, done, failed, unknown]
        result:
          nullable: true

    WorkerTaskListResponse:
      type: object
      required: [total, items]
      properties:
        total:
          type: integer
        items:
          type: array
          items:
            type: object
            properties:
              task_id:
                type: string
                format: uuid
              worker_id:
                type: string
              status:
                type: string
              created_at:
                type: string

    HTTPError:
      type: object
      properties:
        detail:
          type: string

paths:
  /api/v1/workers/:
    get:
      summary: List all workers
      tags: [Workers]
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkerListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPError"

  /api/v1/workers/{worker_id}:
    get:
      summary: Get worker details
      tags: [Workers]
      parameters:
        - name: worker_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkerInfo"
        "404":
          description: Worker not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPError"

  /api/v1/workers/{worker_id}/tasks:
    post:
      summary: Submit a task to a worker
      tags: [Workers]
      parameters:
        - name: worker_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkerTaskSubmitRequest"
      responses:
        "202":
          description: Task accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkerTaskSubmitResponse"
        "401":
          description: Unauthorized
        "404":
          description: Worker not found
        "422":
          description: Validation error
        "429":
          description: Rate limited (20 req/min)

    get:
      summary: List tasks for a worker filtered by external user
      tags: [Workers]
      parameters:
        - name: worker_id
          in: path
          required: true
          schema:
            type: string
        - name: external_user_id
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkerTaskListResponse"
        "401":
          description: Unauthorized

  /api/v1/workers/{worker_id}/tasks/{task_id}:
    get:
      summary: Get task status and result
      tags: [Workers]
      parameters:
        - name: worker_id
          in: path
          required: true
          schema:
            type: string
        - name: task_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: external_user_id
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkerTaskStatusResponse"
        "401":
          description: Unauthorized
        "404":
          description: Task not found

tags:
  - name: Workers
    description: CEONova integration endpoints
